kind = "mobile"
previewPath = "/backapp/"
title = "BackApp — Cyber Shepherd"
version = "1.0.0"
id = "artifacts/backapp"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/backapp/" ]
localPort = 21588

[services.development]
run = "pnpm --filter @workspace/backapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/backapp", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/backapp", "run", "serve" ]

[services.env]
PORT = "21588"
BASE_PATH = "/backapp/"
