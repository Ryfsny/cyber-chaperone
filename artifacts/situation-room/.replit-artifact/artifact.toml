kind = "web"
previewPath = "/"
title = "Cyber Chaperone Situation Room"
version = "1.0.0"
id = "artifacts/situation-room"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19879

[services.development]
run = "pnpm --filter @workspace/situation-room run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/situation-room", "run", "build" ]
publicDir = "artifacts/situation-room/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19879"
BASE_PATH = "/"
