kind = "web"
previewPath = "/website/"
title = "eblockwatch Website"
version = "1.0.0"
id = "artifacts/eblockwatch-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/website/" ]
localPort = 24917

[services.development]
run = "pnpm --filter @workspace/eblockwatch-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eblockwatch-website", "run", "build" ]
publicDir = "artifacts/eblockwatch-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24917"
BASE_PATH = "/website/"
